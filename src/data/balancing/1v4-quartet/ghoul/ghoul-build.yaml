# Perk allow-list example: The Trapper
# Run from the repo root:
#   node utilities/perk-sheet-generator/perk-sheet-generator.js \
#        utilities/perk-sheet-generator/examples/the-trapper.yaml \
#        --out utilities/perk-sheet-generator/output \
#        --preset utilities/perk-sheet-generator/output/test-preset.json

killer: The Ghoul
balancing: DBD Arena - 1v4 Quartet Rank v0.1
# universe is optional; defaults to every perk in dbdperks.json for each side.
# universe:
#   killer: all
#   survivor: all

display:
  killerPerks: allow
  survivorPerks: allow
  addons: ban
  items: allow

killerPerks:
  default: deny
  allow:
    - Bamboozle
    - Blood Echo
    - Brutal Strength
    - Call of Brine
    - Corrupt Intervention
    - Coulrophobia
    - Deadlock
    - Deathbound
    - Dying Light
    - Eruption
    - Furtive Chase
    - "Hex: Huntress Lullaby"
    - "Hex: The Third Seal"
    - Hysteria
    - Infectious Fright
    - Leverage
    - Oppression
    - Overcharge
    - Pop Goes the Weasel
    - "Scourge Hook: Gift of Pain"
    - "Scourge Hook: Pain Resonance"
    - "Scourge Hook: Jagged Compass"
    - Sloppy Butcher
    - Surge
    - Surveillance
    - Thanatophobia
    - Thrilling Tremors
    - Tinkerer
    - Trail of Torment
    - Turn Back the Clock

addons:
  default: deny
  allow:
    - {rarity: "Common"}
    - {rarity: "Uncommon"}
    - Amon's Necktie
    - Aogiri Tree Robe
    - Mado's Glove
    - Red Spider Lily
    - Fresh Coffee

survivorPerks:
  default: deny          # Start with no survivor perks allowed
  allow:                 # Then allow these specific perks and groups
    - Adrenaline
    - Aftercare
    - Any Means Necessary
    - Bada Bada Boom
    - Balanced Landing
    - Better than New
    - Bite the Bullet
    - Blood Pact
    - Boil Over
    - Bond
    #- Botany Knowledge
    - Champion of Light
    - Chemical Trap
    - Counterforce
    - Dead Hard
    - Desperate Measures
    - Detective's Hunch
    - Distortion
    - Diversion
    - Empathic Connection
    - Five Moves Ahead
    - Fixated
    - Flashbang
    - Flow State
    - For the People
    - Head On
    - Inner Strength
    - Iron Will
    - Leader
    - Light-Footed
    - Lithe
    - Lucky Star
    - No Mither
    - Quick and Quiet
    - Repressed Alliance
    - Residual Manifest
    - Saboteur
    - Second Wind
    - Smash Hit
    - Sprint Burst
    - Tenacity
    - Urban Evasion
    - Visionary
    - Windows of Opportunity
  deny: []

items:
  Flashlight:
    count: 1
    default: deny
    allow:
      - Sport Flashlight
    addons:
      count: 2
      default: deny
      allow:
        - {rarity: "Common"}
  Firecracker:
    count: 1
    allow:
      - Firecracker