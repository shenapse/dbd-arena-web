# Build Template

killer: 
balancing: DBD Arena - 1v4 Duo+Duo Rank v0.1
# universe is optional; defaults to every perk in dbdperks.json for each side.
# universe:
#   killer: all
#   survivor: all

killerPerks:
  default: deny          # Start with no killer perks allowed
  allow:                 # Then allow specific perks
    - Bamboozle

addons:
  default: deny         # Start with no add-on allowed
  allow:                 # allow wins on conflict
    - {rarity: "Common"}
    - {rarity: "Uncommon"}
    - {rarity: "Rare"}

survivorPerks:
  default: deny          # Start with no survivor perks allowed
  allow:                 # Then allow these specific perks
    - Any Means Necessary
  deny: []

items:
  Flashlight:
    default: deny
    allow:
      - Sport Flashlight
    addons:
      default: deny
      allow:
        - {rarity: "Common"}

  Med-Kit:
    default: deny
    deny:
      - Ranger Med-Kit
    addons:
      default: deny
      # allow:
      #   - Bandages
      #   - Gel Dressings

  Firecracker:
    allow:
      - Firecracker