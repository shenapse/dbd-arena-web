    - Champion of Light
    - Chemical Trap
    - Counterforce
    - Dead Hard
    # - Decisive Strike
    - Deliverance
    - Desperate Measures
    - Detective's Hunch
    - Distortion
    # - Diversion
    # - Do No Harm
    - Empathic Connection
    - Empathy
    # - Finesse
    - Five Moves Ahead
    - Fixated
    - flashbang
    - Flow State
    - For the People
    - Head On
    - Inner Strength
    - Iron Will
    - Leader
    - Light-Footed
    - Lithe
    - Lucky Star
    # - Made for This
    - No Mither
    # - Overcome
    - Plot Twist
    - Quick and Quiet
    # - Reactive Healing
    - Repressed Alliance
