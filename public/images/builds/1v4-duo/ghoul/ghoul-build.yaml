killer: The Ghoul
balancing: DBD Arena - 1v4 Duo+Duo Rank v0.1
# universe is optional; defaults to every perk in dbdperks.json for each side.
# universe:
#   killer: all
#   survivor: all

# Map: Ormond Lake Mine

killerPerks:
  default: deny
  allow:
    - Bamboozle
    - Blood Echo
    - Brutal Strength
    - Call of Brine
    - Corrupt Intervention
    - Coulrophobia
    - Deadlock
    - Deathbound
    - Dying Light
    - Eruption
    - Furtive Chase
    - "Hex: Huntress Lullaby"
    - "Hex: The Third Seal"
    - Hysteria
    - Infectious Fright
    - Leverage
    - Oppression
    - Overcharge
    - Pop Goes the Weasel
    - "Scourge Hook: Gift of Pain"
