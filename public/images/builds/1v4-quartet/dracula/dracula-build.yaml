killer: The Dark Lord
balancing: DBD Arena - 1v4 Quartet Rank v0.1
# universe is optional; defaults to every perk in dbdperks.json for each side.
# universe:
#   killer: all
#   survivor: all

killerPerks:
  default: deny
  allow:
  - Bamboozle
  - Call of Brine
  - Corrupt Intervention
  - Coulrophobia
  - Deathbound
  - Dying Light
  - Eruption
  - "Hex: Huntress Lullaby"
  - "Hex: The Third Seal"
  - Infectious Fright
  - Leverage
  - Oppression
  - Overcharge
  - Pop Goes the Weasel
  - "Scourge Hook: Gift of Pain"
  - "Scourge Hook: Pain Resonance"
  - "Scourge Hook: Jagged Compass"
  - Sloppy Butcher
  - Surge
  - Surveillance
  - Thanatophobia
  - Thrilling Tremors
  - Tinkerer
  - Trail of Torment

addons:
  default: deny
  allow:
    - {rarity: "Common"}
    - {rarity: "Uncommon"}
    - {rarity: "Rare"}
    - Lapis Lazuli

survivorPerks:
  default: deny
  allow:
  - Aftercare
  - Any Means Necessary
  - Bada Bada Boom
  - Balanced Landing
  - Bite the Bullet
  - Bond
  - Chemical Trap
  - Counterforce
  - Dead Hard
  - Decisive Strike
  - Deliverance
  - Desperate Measures
  - Detective's Hunch
  - Empathic Connection
  - Empathy
  - Flashbang
  - Five Moves Ahead
  - Fixated
  - Flow State
  - Head On
  - Inner Strength
  - Leader
  - Lithe
  - Lucky Star
  - No Mither
  - Overcome
  - Quick and Quiet
  - Second Wind
  - Smash Hit
  - Sprint Burst
  - Tenacity
  - Unbreakable
  - Urban Evasion
  - Visionary
  - Windows of Opportunity
  deny: []

survivorRepetitionLimits:
  - scope: team
    max: 1
    perks: all
      
