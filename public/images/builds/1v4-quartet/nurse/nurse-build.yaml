# Perk allow-list example: The Trapper
# Run from the repo root:
#   node utilities/perk-sheet-generator/perk-sheet-generator.js \
#        utilities/perk-sheet-generator/examples/the-trapper.yaml \
#        --out utilities/perk-sheet-generator/output \
#        --preset utilities/perk-sheet-generator/output/test-preset.json

killer: The Nurse
balancing: DBD Arena - 1v4 Quartet Rank v0.1
# universe is optional; defaults to every perk in dbdperks.json for each side.
# universe:
#   killer: all
#   survivor: all

display:
  killerPerks: allow
  survivorPerks: allow
  addons: allow
  items: allow

killerPerks:
  default: deny          # Start with all killer perks allowed
  allow:                 # Then deny these specific perks
    - Call of Brine
    - Corrupt Intervention
    - Dying Light
    - Eruption
    - Furtive Chase
    - "Hex: Huntress Lullaby"
    - "Hex: The Third Seal"
    - Infectious Fright
    - Leverage
    - Mindbreaker
    - Oppression
    - Overcharge
    - Surveillance
    - Thanatophobia
    - Thrilling Tremors
    - Tinkerer
    - Trail of Torment
    - Turn Back the Clock
    - "Scourge Hook: Gift of Pain"
    - "Scourge Hook: Jagged Compass"
    - Pop Goes the Weasel

addons:
  default: allow
  deny:
    - {rarity: "Ultra Rare"}
    - Campbell's Last Breath
    - Jenner's Last Breath
    - Heavy Panting
    - Ataxic Respiration

survivorPerks:
  default: deny          # Start with no survivor perks allowed
  allow:                 # Then allow these specific perks and groups
    - Balanced Landing
    - Bite the Bullet
    - Bond
    - Botany Knowledge
    - Champion of Light
    - Counterforce
    - Distortion
    - Dead Hard
    - Deliverance
    - Desperate Measures
    - Detective's Hunch
    - Fixated
    - flashbang
    - Flow State
    - For the People
    - Head On
    - Decisive Strike
    - Do No Harm
    - Inner Strength
    - Iron Will
    - Leader
    - Light-Footed
    - Lithe
    - Lucky Star
    - Made for This
    - Overcome
    - Plot Twist
    - Quick and Quiet
    - Second Wind
    - Self-Care
    - Tenacity
    - Unbreakable
    - Urban Evasion
    - Visionary
    - We'll Make It
  deny: []

items:
  Flashlight:
    count: 1
    default: deny
    allow:
      - Sport Flashlight
    addons:
      count: 2
      default: deny
      allow:
        - {rarity: "Common"}

  Med-Kit:
    count: 1
    default: deny
    allow:
      - Ranger Med-Kit
    addons:
      count: 2
      default: deny
      allow:
        - Bandages
        - Gel Dressings

  Firecracker:
    count: 1
    allow:
      - Firecracker