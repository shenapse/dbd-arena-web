# Perk allow-list example: The Trapper
# Run from the repo root:
#   node utilities/perk-sheet-generator/perk-sheet-generator.js \
#        utilities/perk-sheet-generator/examples/the-trapper.yaml \
#        --out utilities/perk-sheet-generator/output \
#        --preset utilities/perk-sheet-generator/output/test-preset.json

killer: The Spirit
balancing: DBD Arena - 1v4 Quartet Rank v0.1
# universe is optional; defaults to every perk in dbdperks.json for each side.
# universe:
#   killer: all
#   survivor: all

killerPerks:
  default: deny          # Start with all killer perks allowed
  allow:                 # Then deny these specific perks
    - Call of Brine
    - Corrupt Intervention
    - Coulrophobia
    - Deathbound
    - Dying Light
    - Eruption
    - Furtive Chase
    - "Hex: Huntress Lullaby"
    - "Hex: The Third Seal"
    - Infectious Fright
    - Leverage
    - Oppression
    - Overcharge
    - Pop Goes the Weasel
    - "Scourge Hook: Gift of Pain"
    - "Scourge Hook: Pain Resonance"
    - "Scourge Hook: Jagged Compass"
    - Sloppy Butcher
    - Surge
    - Surveillance
    - Thanatophobia
    - Thrilling Tremors
    - Tinkerer
    - Trail of Torment
    - Turn Back the Clock

survivorPerks:
  default: deny          # Start with no survivor perks allowed
  allow:                 # Then allow these specific perks and groups
    - Any Means Necessary
    - Balanced Landing
    - Blood Pact
    - Boil Over
    - Bond
    - Botany Knowledge
    - Chemical Trap
    - Dead Hard
    - Desperate Measures
    - Diversion
    - Do No Harm
    - Finesse
    - Five Moves Ahead
    - Fixated
    - flashbang
    - Flow State
    - For the People
    - Head On
    - Inner Strength
    - Leader
    - Lithe
    - Made for This
    - Overcome
    - Quick and Quiet
    - Repressed Alliance
    - Second Wind
    - Smash Hit
    - Sprint Burst
    - Tenacity
    - Unbreakable
    - Urban Evasion
    - Visionary
    - Windows of Opportunity
  deny: []

items:
  Flashlight:
    default: deny
    allow:
      - Sport Flashlight
    addons:
      default: deny
      allow:
        - {rarity: "Common"}

  Med-Kit:
    default: deny
    deny:
      - Ranger Med-Kit
    addons:
      default: deny
      allow:
        - Bandages
        - Gel Dressings

addons:
  default: deny         # Start with every Trapper add-on allowed
  allow:                 # allow wins on conflict — re-permit one iridescent
    - {rarity: "Common"}
    - {rarity: "Uncommon"}
    - {rarity: "Rare"}
    - Kintsugi Teacup